name: Channel Kernel Build
on:
  workflow_dispatch:
    inputs:
      LINEAGE:
        description: 'Select the LineageOS version'
        required: true
        default: '17.1'
        type: choice
        options:
          - 16.0
          - 17.1
          - 18.1
          - 19.1
          - 20
          - 21
          - 22.0
          - 22.1
          - 22.2
          - 23.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison flex libssl-dev make libncurses-dev zip python3

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-${{ github.event.inputs.LINEAGE }} \
            https://github.com/SaaSD3v/android_kernel_motorola_sdm632.git kernel

      - name: Clone ReSukiSU
        run: |
          git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git kernel/KernelSU

      - name: Download and apply ReSukiSU patch
        run: |
          wget -q https://raw.githubusercontent.com/ReSukiSU/ReSukiSU_Patches/main/scope-minimized/kernel-4.9.patch -O /tmp/ksu.patch
          cd kernel
          git apply /tmp/ksu.patch

      - name: Integrate ReSukiSU into kernel build system
        run: |
          cd kernel
          ln -sf "$(pwd)/KernelSU/kernel" drivers/kernelsu
          printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Enable ReSukiSU in defconfig
        run: |
          cd kernel
          echo "CONFIG_KSU=y" >> arch/arm64/configs/channel_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/channel_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK=y" >> arch/arm64/configs/channel_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK=y" >> arch/arm64/configs/channel_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK=y" >> arch/arm64/configs/channel_defconfig

      - name: Set build start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Download AOSP Clang r365631c
        run: |
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android11-release/clang-r365631c.tar.gz
          mkdir -p toolchains/clang-host-linux-x86
          tar -xzf clang-r365631c.tar.gz -C toolchains/clang-host-linux-x86
          echo "CLANG_BIN=${PWD}/toolchains/clang-host-linux-x86/bin" >> $GITHUB_ENV

      - name: Download GCC 4.9 AArch64
        run: |
          git clone --depth=1 -b android11-release https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchains/gcc-aarch64-4.9
          echo "GCC64_BIN=${PWD}/toolchains/gcc-aarch64-4.9/bin" >> $GITHUB_ENV

      - name: Download GCC 4.9 ARM32
        run: |
          git clone --depth=1 -b android11-release https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 toolchains/arm-linux-androideabi-4.9
          echo "GCC32_BIN=${PWD}/toolchains/arm-linux-androideabi-4.9/bin" >> $GITHUB_ENV

      - name: Configure kernel
        run: |
          export PATH="$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PWD/kernel/scripts:$PATH"
          make -C kernel O=$PWD/build ARCH=arm64 CC=clang HOSTCC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 channel_defconfig

      - name: Build kernel
        run: |
          export PATH="$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PWD/kernel/scripts:$PATH"
          make -C kernel O=$PWD/build ARCH=arm64 CC=clang HOSTCC=clang CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 -j$(nproc) Image.gz-dtb

      - name: Set build end time
        run: echo "END_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Calculate build duration
        run: |
          duration=$(($END_TIME - $START_TIME))
          minutes=$(($duration / 60))
          seconds=$(($duration % 60))
          echo "BUILD_DURATION=${minutes}m ${seconds}s" >> $GITHUB_ENV

      - name: Package with AnyKernel
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          cp build/arch/arm64/boot/Image.gz-dtb anykernel/
          cp anykernel.sh anykernel/
          cd anykernel
          zip -r9 ../Channel-Kernel-${{ github.event.inputs.LINEAGE }}.zip * -x '*.git*'
          echo ""
          echo "========================================="
          echo "  Channel Kernel ${{ github.event.inputs.LINEAGE }}"
          echo "  Device: Moto G7 Play (channel)"
          echo "  Build duration: $BUILD_DURATION"
          echo "========================================="

      - uses: actions/upload-artifact@v4
        with:
          name: Channel-Kernel-${{ github.event.inputs.LINEAGE }}
          path: Channel-Kernel-${{ github.event.inputs.LINEAGE }}.zip
